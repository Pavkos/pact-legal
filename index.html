<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pact: Debt Payoff Planner</title>
  <meta name="description" content="Legal and support pages for Pact: Debt Payoff Planner.">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0d0d0e;
      --fg: #f5f3ee;
      --muted: #b7b4ab;
      --line: #343434;
      --card: #171718;
      --accent: #f5f3ee;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.55;
    }
    main {
      width: min(760px, calc(100% - 40px));
      margin: 0 auto;
      padding: 72px 0;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(38px, 7vw, 72px);
      line-height: 1;
      letter-spacing: 0;
    }
    p {
      color: var(--muted);
      font-size: 18px;
      max-width: 620px;
    }
    nav {
      display: grid;
      gap: 12px;
      margin-top: 40px;
    }
    a {
      color: var(--fg);
    }
    nav a {
      display: block;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Pact</h1>
    <p>Debt payoff planning without bank sync. Local-first, manual, and built to show how each payment changes the route.</p>
    <nav>
      <a href="./privacy/">Privacy Policy</a>
      <a href="./support/">Support</a>
    </nav>
  </main>
</body>
</html>
